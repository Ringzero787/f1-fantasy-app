name: iOS App Store Screenshots

on:
  workflow_dispatch:
    inputs:
      devices:
        description: 'Devices to screenshot (comma-separated)'
        required: false
        default: 'iPhone 15 Pro Max,iPad Pro 13-inch (M4)'

jobs:
  screenshots:
    runs-on: macos-15
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        device:
          - name: "iPhone 15 Pro Max"
            folder: "iphone_6.7"
          - name: "iPad Pro 13-inch (M4)"
            folder: "ipad_12.9"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Write .env file
        run: echo "${{ secrets.MACTESTING }}" > .env

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build simulator app via EAS
        run: |
          # Build a simulator-compatible app locally
          # EAS local builds produce a .tar.gz containing the .app
          npm ci

          cat > GoogleService-Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>API_KEY</key><string>placeholder</string>
            <key>GCM_SENDER_ID</key><string>000000000000</string>
            <key>PLIST_VERSION</key><string>1</string>
            <key>BUNDLE_ID</key><string>com.undercut.app</string>
            <key>PROJECT_ID</key><string>placeholder</string>
            <key>STORAGE_BUCKET</key><string>placeholder.appspot.com</string>
            <key>IS_ADS_ENABLED</key><false/>
            <key>IS_ANALYTICS_ENABLED</key><false/>
            <key>IS_APPINVITE_ENABLED</key><false/>
            <key>IS_GCM_ENABLED</key><false/>
            <key>IS_SIGNIN_ENABLED</key><false/>
            <key>GOOGLE_APP_ID</key><string>1:000000000000:ios:0000000000000000</string>
          </dict>
          </plist>
          PLIST

          npx expo prebuild --platform ios --clean

          cd ios
          xcodebuild \
            -workspace Undercut.xcworkspace \
            -scheme Undercut \
            -configuration Release \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            EXCLUDED_ARCHS= \
            RCT_NO_LAUNCH_PACKAGER=1 \
            2>&1 | tee /tmp/xcodebuild.log | tail -50

          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "=== Build errors ==="
            grep "error:" /tmp/xcodebuild.log | tail -20
            exit 1
          fi

      - name: Find .app bundle
        id: app
        run: |
          APP_PATH=$(find ios/build -name "Undercut.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ios/build -name "*.app" -type d | head -1)
          fi
          echo "path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found app at: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "Build directory:"
            find ios/build -type d -maxdepth 6 2>/dev/null || true
            exit 1
          fi

      - name: Boot Simulator
        run: |
          DEVICE_NAME="${{ matrix.device.name }}"
          DEVICE_UDID=$(xcrun simctl create "ScreenshotDevice" "$DEVICE_NAME")
          echo "Created simulator: $DEVICE_UDID"
          xcrun simctl boot "$DEVICE_UDID"
          echo "DEVICE_UDID=$DEVICE_UDID" >> $GITHUB_ENV

          # Wait for simulator to be ready
          sleep 10
          xcrun simctl status_bar "$DEVICE_UDID" override \
            --time "9:41" \
            --batteryState charged \
            --batteryLevel 100 \
            --wifiBars 3 \
            --cellularBars 4

      - name: Install app on Simulator
        run: |
          xcrun simctl install "$DEVICE_UDID" "${{ steps.app.outputs.path }}"

      - name: Grant permissions
        run: |
          # Pre-grant notification permission to avoid system dialog blocking Maestro
          xcrun simctl privacy "$DEVICE_UDID" grant notifications com.undercut.app 2>/dev/null || true
          xcrun simctl privacy "$DEVICE_UDID" grant photos com.undercut.app 2>/dev/null || true

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Take Screenshots
        run: |
          export PATH="$HOME/.maestro/bin:$PATH"
          mkdir -p screenshots/${{ matrix.device.folder }}
          OUTDIR="screenshots/${{ matrix.device.folder }}"

          # Launch the app
          xcrun simctl launch "$DEVICE_UDID" com.undercut.app
          sleep 8

          # Screenshot 1: Login screen
          xcrun simctl io "$DEVICE_UDID" screenshot "$OUTDIR/01_login.png"
          echo "Captured 01_login.png"

          # Enter demo mode via Maestro (long-press "Undercut" text)
          cat > /tmp/enter-demo.yaml << 'DEMO'
          appId: com.undercut.app
          ---
          - longPressOn:
              text: "Undercut"
          - waitForAnimationToEnd:
              timeout: 8000
          DEMO
          maestro --udid "$DEVICE_UDID" test /tmp/enter-demo.yaml || true
          sleep 5

          # Screenshot 2: My Team (create team empty state)
          xcrun simctl io "$DEVICE_UDID" screenshot "$OUTDIR/02_create_team.png"
          echo "Captured 02_create_team.png"

          # Create a team via Maestro
          cat > /tmp/create-team.yaml << 'CREATE'
          appId: com.undercut.app
          ---
          - tapOn: "Team name"
          - inputText: "Demo Racing"
          - hideKeyboard
          - tapOn: "Create Team"
          - waitForAnimationToEnd:
              timeout: 5000
          CREATE
          maestro --udid "$DEVICE_UDID" test /tmp/create-team.yaml || true
          sleep 3

          # Screenshot 3: My Team (empty team with slots)
          xcrun simctl io "$DEVICE_UDID" screenshot "$OUTDIR/03_myteam_empty.png"
          echo "Captured 03_myteam_empty.png"

          # Tap Market toggle
          cat > /tmp/goto-market.yaml << 'MARKET'
          appId: com.undercut.app
          ---
          - tapOn: "Market"
          - waitForAnimationToEnd:
              timeout: 3000
          MARKET
          maestro --udid "$DEVICE_UDID" test /tmp/goto-market.yaml || true
          sleep 3

          # Screenshot 4: Market
          xcrun simctl io "$DEVICE_UDID" screenshot "$OUTDIR/04_market.png"
          echo "Captured 04_market.png"

          # Tap Standings toggle
          cat > /tmp/goto-standings.yaml << 'STANDINGS'
          appId: com.undercut.app
          ---
          - tapOn: "Standings"
          - waitForAnimationToEnd:
              timeout: 3000
          STANDINGS
          maestro --udid "$DEVICE_UDID" test /tmp/goto-standings.yaml || true
          sleep 3

          # Screenshot 5: Standings (no league / create league)
          xcrun simctl io "$DEVICE_UDID" screenshot "$OUTDIR/05_standings.png"
          echo "Captured 05_standings.png"

          # Go back to My Team and tap Profile pill
          cat > /tmp/goto-profile.yaml << 'PROFILE'
          appId: com.undercut.app
          ---
          - tapOn: "My Team"
          - waitForAnimationToEnd:
              timeout: 2000
          - tapOn: "Profile"
          - waitForAnimationToEnd:
              timeout: 3000
          PROFILE
          maestro --udid "$DEVICE_UDID" test /tmp/goto-profile.yaml || true
          sleep 3

          # Screenshot 6: Profile sheet
          xcrun simctl io "$DEVICE_UDID" screenshot "$OUTDIR/06_profile.png"
          echo "Captured 06_profile.png"

          echo "All screenshots taken:"
          ls -la "$OUTDIR/"

      - name: List screenshots
        if: always()
        run: |
          echo "Screenshots taken:"
          find screenshots -name "*.png" -exec ls -la {} \;

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.device.folder }}
          path: screenshots/
          retention-days: 30

      - name: Cleanup Simulator
        if: always()
        run: |
          xcrun simctl shutdown "$DEVICE_UDID" 2>/dev/null || true
          xcrun simctl delete "$DEVICE_UDID" 2>/dev/null || true
