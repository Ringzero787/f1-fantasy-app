name: iOS App Store Screenshots

on:
  workflow_dispatch:
    inputs:
      devices:
        description: 'Devices to screenshot (comma-separated)'
        required: false
        default: 'iPhone 15 Pro Max,iPad Pro 13-inch (M4)'

jobs:
  screenshots:
    runs-on: macos-15
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        device:
          - name: "iPhone 15 Pro Max"
            folder: "iphone_6.7"
          - name: "iPad Pro 13-inch (M4)"
            folder: "ipad_12.9"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Write .env file
        run: echo "${{ secrets.MACTESTING }}" > .env

      - name: Install dependencies
        run: npm ci

      - name: Create GoogleService-Info.plist for prebuild
        run: |
          cat > GoogleService-Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>API_KEY</key>
            <string>placeholder</string>
            <key>GCM_SENDER_ID</key>
            <string>000000000000</string>
            <key>PLIST_VERSION</key>
            <string>1</string>
            <key>BUNDLE_ID</key>
            <string>com.undercut.app</string>
            <key>PROJECT_ID</key>
            <string>placeholder</string>
            <key>STORAGE_BUCKET</key>
            <string>placeholder.appspot.com</string>
            <key>IS_ADS_ENABLED</key>
            <false/>
            <key>IS_ANALYTICS_ENABLED</key>
            <false/>
            <key>IS_APPINVITE_ENABLED</key>
            <false/>
            <key>IS_GCM_ENABLED</key>
            <false/>
            <key>IS_SIGNIN_ENABLED</key>
            <false/>
            <key>GOOGLE_APP_ID</key>
            <string>1:000000000000:ios:0000000000000000</string>
          </dict>
          </plist>
          PLIST

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean

      - name: Build for Simulator
        run: |
          cd ios
          xcodebuild \
            -workspace Undercut.xcworkspace \
            -scheme Undercut \
            -configuration Release \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -30

      - name: Find .app bundle
        id: app
        run: |
          APP_PATH=$(find ios/build -name "*.app" -type d | head -1)
          echo "path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found app at: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found!"
            find ios/build -type d -maxdepth 5 2>/dev/null || true
            exit 1
          fi

      - name: Boot Simulator
        run: |
          DEVICE_NAME="${{ matrix.device.name }}"
          DEVICE_UDID=$(xcrun simctl create "ScreenshotDevice" "$DEVICE_NAME")
          echo "Created simulator: $DEVICE_UDID"
          xcrun simctl boot "$DEVICE_UDID"
          echo "DEVICE_UDID=$DEVICE_UDID" >> $GITHUB_ENV

          # Wait for simulator to be ready
          sleep 10
          xcrun simctl status_bar "$DEVICE_UDID" override \
            --time "9:41" \
            --batteryState charged \
            --batteryLevel 100 \
            --wifiBars 3 \
            --cellularBars 4

      - name: Install app on Simulator
        run: |
          xcrun simctl install "$DEVICE_UDID" "${{ steps.app.outputs.path }}"

      - name: Grant permissions
        run: |
          # Pre-grant notification permission to avoid system dialog blocking Maestro
          xcrun simctl privacy "$DEVICE_UDID" grant notifications com.undercut.app 2>/dev/null || true
          xcrun simctl privacy "$DEVICE_UDID" grant photos com.undercut.app 2>/dev/null || true

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Take Screenshots
        run: |
          export PATH="$HOME/.maestro/bin:$PATH"
          mkdir -p screenshots/${{ matrix.device.folder }}
          OUTDIR="screenshots/${{ matrix.device.folder }}"

          # Launch the app
          xcrun simctl launch "$DEVICE_UDID" com.undercut.app
          sleep 5

          # Screenshot 1: Login screen
          xcrun simctl io "$DEVICE_UDID" screenshot "$OUTDIR/01_login.png"

          # Use Maestro to tap Demo Mode and enter the app
          maestro --udid "$DEVICE_UDID" test \
            --output "$OUTDIR" \
            .maestro/screenshots/take-screenshots.yaml || true

          # Screenshot 2: Home (Maestro should have navigated here)
          sleep 3
          xcrun simctl io "$DEVICE_UDID" screenshot "$OUTDIR/02_home.png"

          # Navigate via deep links and take screenshots
          xcrun simctl openurl "$DEVICE_UDID" "theundercut://my-team"
          sleep 5
          xcrun simctl io "$DEVICE_UDID" screenshot "$OUTDIR/03_myteam.png"

          xcrun simctl openurl "$DEVICE_UDID" "theundercut://market"
          sleep 5
          xcrun simctl io "$DEVICE_UDID" screenshot "$OUTDIR/04_market.png"

          xcrun simctl openurl "$DEVICE_UDID" "theundercut://calendar"
          sleep 5
          xcrun simctl io "$DEVICE_UDID" screenshot "$OUTDIR/05_calendar.png"

          xcrun simctl openurl "$DEVICE_UDID" "theundercut://leagues"
          sleep 5
          xcrun simctl io "$DEVICE_UDID" screenshot "$OUTDIR/06_leagues.png"

          echo "Screenshots taken:"
          ls -la "$OUTDIR/"

      - name: List screenshots
        if: always()
        run: |
          echo "Screenshots taken:"
          find screenshots -name "*.png" -exec ls -la {} \;

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.device.folder }}
          path: screenshots/
          retention-days: 30

      - name: Cleanup Simulator
        if: always()
        run: |
          xcrun simctl shutdown "$DEVICE_UDID" 2>/dev/null || true
          xcrun simctl delete "$DEVICE_UDID" 2>/dev/null || true
