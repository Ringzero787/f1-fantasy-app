appId: com.undercut.app
---

# Wait for app to fully load
- waitForAnimationToEnd:
    timeout: 15000

# Screenshot 1: Login / Auth screen
- takeScreenshot: 01_login

# Tap "Try Demo Mode" to enter the app without auth
- tapOn:
    text: "Try Demo Mode"

# Give the app time to navigate and load
- waitForAnimationToEnd:
    timeout: 15000

# Dismiss notification permission dialog if it appears
- tapOn:
    text: "Allow"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Skip tutorial / onboarding if present
- tapOn:
    text: "Skip Tutorial"
    optional: true
- tapOn:
    text: "Next"
    optional: true
- tapOn:
    text: "Next"
    optional: true
- tapOn:
    text: "Next"
    optional: true
- tapOn:
    text: "Skip Tutorial"
    optional: true
- tapOn:
    text: "Get Started"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Screenshot 2: Home screen
- takeScreenshot: 02_home

# Navigate to My Team tab (using testID since labels are hidden)
- tapOn:
    id: "tab-my-team"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 03_myteam

# Navigate to Market tab
- tapOn:
    id: "tab-market"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 04_market

# Navigate to Calendar tab
- tapOn:
    id: "tab-calendar"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 05_calendar

# Navigate to Leagues tab
- tapOn:
    id: "tab-leagues"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 06_leagues
