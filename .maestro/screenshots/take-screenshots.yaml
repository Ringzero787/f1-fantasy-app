appId: com.undercut.app
---

# Wait for app to fully load
- waitForAnimationToEnd:
    timeout: 10000

# Screenshot 1: Login / Auth screen
- takeScreenshot: 01_login

# Tap "Continue as Guest" or demo mode to get into the app
- tapOn:
    text: "Demo Mode"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# If we see "Continue as Guest", tap it
- tapOn:
    text: "Continue as Guest"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Screenshot 2: Home screen
- takeScreenshot: 02_home

# Navigate to My Team tab
- tapOn:
    text: "My Team"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: 03_myteam

# Navigate to Market tab
- tapOn:
    text: "Market"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: 04_market

# Navigate to Calendar tab
- tapOn:
    text: "Calendar"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: 05_calendar

# Navigate to Leagues tab
- tapOn:
    text: "Leagues"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: 06_leagues

# Navigate to Chat tab (if visible)
- tapOn:
    text: "Chat"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: 07_chat
